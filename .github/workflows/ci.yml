name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  macos:
    name: test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install tmux (e2e tests spawn isolated tmux servers)
        run: brew install tmux
      - uses: Swatinem/rust-cache@v2
      - name: Build (all targets, warnings are errors)
        run: RUSTFLAGS="-D warnings" cargo build --all-targets
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  linux:
    # Linux support is documented as untested; this job is the ongoing
    # verification. Keep it non-blocking until it has a green track record.
    name: test (Linux, experimental)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
